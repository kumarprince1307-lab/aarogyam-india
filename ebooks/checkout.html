<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Checkout | Aarogyam India</title>
    <meta name="description" content="Secure Checkout for Aarogyam India eBooks.">
    <meta name="robots" content="index,follow">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/checkout.css">
</head>

<body>

    <!-- =========================
         HEADER
    ========================== -->
    <header class="checkout-header">

        <a href="javascript:history.back()" class="back-btn">
            ← Back
        </a>

        <h1>Secure Checkout</h1>

    </header>

    <!-- =========================
         MAIN CONTAINER
    ========================== -->

    <main class="checkout-container">

        <!-- =====================
             BOOK SUMMARY
        ====================== -->

        <section class="book-summary">

            <div class="book-cover">

                <img
                    id="bookCover"
                    src=""
                    alt="Book Cover">

            </div>

            <div class="book-info">

                <h2 id="bookName">
                    Loading...
                </h2>

                <p class="mrp">
                    MRP :
                    <del id="bookMrp"></del>
                </p>

                <p class="offer">

                    Offer Price :

                    <strong id="bookPrice"></strong>

                </p>

                <p class="access">

                    ✅ Lifetime Access

                </p>

            </div>

        </section>

        <!-- =====================
             CUSTOMER DETAILS
        ====================== -->

        <section class="customer-details">

            <h2>
                Customer Details
            </h2>

            <form id="checkoutForm">

                <div class="form-group">

                    <label for="customerName">

                        Full Name

                    </label>

                    <input
                        type="text"
                        id="customerName"
                        placeholder="Enter Full Name"
                        required>

                </div>

                <div class="form-group">

                    <label for="customerMobile">

                        Mobile Number

                    </label>

                    <input
                        type="tel"
                        id="customerMobile"
                        maxlength="10"
                        placeholder="Enter Mobile Number"
                        required>

                </div>

                <div class="form-group">

                    <label for="customerEmail">

                        Email (Optional)

                    </label>

                    <input
                        type="email"
                        id="customerEmail"
                        placeholder="Enter Email">

                </div>

            </form>

        </section>

        <!-- =====================
             ORDER SUMMARY
        ====================== -->

        <section class="order-summary">

            <h2>

                Order Summary

            </h2>

            <div class="summary-row">

                <span>Book</span>

                <span id="summaryBook"></span>

            </div>

            <div class="summary-row">

                <span>MRP</span>

                <span id="summaryMrp"></span>

            </div>

            <div class="summary-row">

                <span>Offer Price</span>

                <span id="summaryPrice"></span>

            </div>

            <div class="summary-row total">

                <strong>Total Payable</strong>

                <strong id="totalPrice"></strong>

            </div>

        </section>

        <!-- =====================
             PAYMENT
        ====================== -->

        <section class="payment-section">

            <div class="payment-info">

                🔒 100% Secure Payment Powered by Razorpay

            </div>

            <button
                id="payNowBtn"
                type="button">

                Pay Now

            </button>

        </section>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="checkout-footer">

        <a href="terms.html">

            Terms & Conditions

        </a>

        <span>|</span>

        <a href="privacy-policy.html">

            Privacy Policy

        </a>

    </footer>

    <!-- =========================
         JAVASCRIPT
    ========================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



    <script src="../js/checkout.js"></script>

</body>
</html>
