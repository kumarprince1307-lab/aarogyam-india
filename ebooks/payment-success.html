<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment Successful | Aarogyam India</title>

    <meta name="description" content="Your payment has been completed successfully.">

    <link rel="stylesheet" href="../css/payment-success.css">
</head>

<body>

<header class="success-header">
    <h1>Payment Successful</h1>
</header>

<main class="success-container">

    <!-- Success Icon -->

    <section class="success-icon">

        <div class="success-circle">

            ✓

        </div>

    </section>

    <!-- Success Message -->

    <section class="success-message">

        <h2>
            Thank You!
        </h2>

        <p>

            Your payment has been received successfully.

        </p>

    </section>

    <!-- Order Details -->

    <section class="order-details">

        <h3>Order Details</h3>

        <div class="detail-row">

            <span>Order ID</span>

            <span id="orderId">Loading...</span>

        </div>

        <div class="detail-row">

            <span>Book</span>

            <span id="bookName">Loading...</span>

        </div>

        <div class="detail-row">

            <span>Amount Paid</span>

            <span id="amountPaid">₹0</span>

        </div>

        <div class="detail-row">

            <span>Payment Status</span>

            <span class="success-status">

                Successful

            </span>

        </div>

    </section>

    <!-- Next Step -->

    <section class="next-step">

        <p>

            Your eBook will be available in My Library.

        </p>

    </section>

    <!-- Buttons -->

    <section class="success-buttons">

        <a href="my-library.html"
           class="library-btn">

            Go To My Library

        </a>

        <a href="agriculture.html"
           class="shopping-btn">

            Continue Shopping

        </a>

    </section>

</main>

<footer class="success-footer">

    © Aarogyam India

</footer>

<script src="../js/payment-success.js"></script>

</body>
</html>
