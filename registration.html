<body>

<div id="registrationPage">

    <!-- Loader -->
    <div id="pageLoader"></div>

    <!-- Toast -->
    <div id="toastMessage"></div>

    <!-- Main Registration Container -->
    <main id="registrationContainer">
        <!-- ========================= -->
        <!-- Top Bar -->
        <!-- ========================= -->

        <section class="top-bar">

            <button
                type="button"
                id="backBtn"
                class="back-btn"
                aria-label="Go Back">

                ← Back

            </button>

            <!-- Google Translate -->
            <div id="google_translate_element"></div>

        </section>

        <!-- ========================= -->
        <!-- Registration Card -->
        <!-- ========================= -->

        <section
            id="registrationCard"
            class="registration-card">

            <!-- Logo -->

            <img
                src="images/logo/logo.png"
                alt="Aarogyam India Logo"
                id="logo"
                class="logo">

            <h1>
                Free Registration
            </h1>

            <p class="subtitle">
                Register once and access Demo Books,
                eBooks, Checkout, Wallet &
                My Library.
            </p>

            <!-- Registration Form -->

            <form
                id="registrationForm"
                autocomplete="on">

                <div class="form-group">

                    <label for="fullName">
                        Full Name *
                    </label>

                    <input
                        type="text"
                        id="fullName"
                        name="fullName"
                        required>

                </div>

                <div class="form-group">

                    <label for="mobile">
                        Mobile Number *
                    </label>

                    <input
                        type="tel"
                        id="mobile"
                        name="mobile"
                        maxlength="10"
                        inputmode="numeric"
                        required>

                </div>

                <div class="form-group">

                    <label for="email">
                        Email (Optional)
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email">

                </div>

                <div class="form-group">

                    <label for="state">
                        State
                    </label>

                    <input
                        type="text"
                        id="state"
                        name="state">

                </div>

                <div class="form-group">

                    <label for="district">
                        District
                    </label>

                    <input
                        type="text"
                        id="district"
                        name="district">

                </div>

                <div class="form-group">

                    <label for="referralMobile">
                        Referral Mobile (Optional)
                    </label>

                    <input
                        type="tel"
                        id="referralMobile"
                        name="referralMobile"
                        maxlength="10"
                        readonly>

                </div>

                <!-- Hidden Fields -->

                <input
                    type="hidden"
                    id="userId">

                <input
                    type="hidden"
                    id="referralSource">

                <input
                    type="hidden"
                    id="redirectPage">

                <label class="terms-box">

                    <input
                        type="checkbox"
                        id="terms"
                        required>

                    I agree to the Terms &
                    Privacy Policy

                </label>

                <button
                    type="submit"
                    id="registerBtn">

                    CREATE FREE ACCOUNT

                </button>

            </form>

            <div
                id="statusMessage">
            </div>

            <div class="alreadyRegistered">

                Already registered?

                Enter your mobile number.

                If your account exists,
                we'll automatically log you in.

            </div>

        </section>

    </main>

</div>
